<body class="bg-black text-white">
    <nav class="flex flex-row justify-between items-center p-4 bg-red-700 text-white">

        <a href="#index">Home</a>
        <a href="about.html">About</a>

    <main class="">
        <div class="flex flex-col items-center justify-center">
            <i class="fa-solid fa-user text-2xl text-red-700 mt-4 items-center" ></i>
            <h2 class="text-center">Event Manager Information</h2>
        </div>
        <div>
            <p class="text-center">please provide your login credentials</p>
        </div>
        <div>
            <form class="container justify-center items-center flex flex-col gap-4 mt-4 border border-gray-300">
                <div>
                    <i class="fa-solid fa-user m-2"></i>
                    <label for"username" >Full Name</label>
                    <input type="text" placeholder="Enter Your Full Legal Name" class="border border-gray-400 rounded p-2 mb-4 block lg:w-[600px]">
                </div>
                <div>
                    <i class="fa-solid fa-lock m-2"></i>
                    <label for="password">Password</label>
                    <input type="password" placeholder="Password" class="border border-gray-400 rounded p-2 mb-4 block lg:w-[600px]">
                </div>

                <div>
                    <i class="fa-solid fa-phone"> </i>
                    <label for="phone number">Phone Number</label>
                    <input type="text" placeholder="Enter Your Phone Number" class="border border-gray-400 rounded p-2 mb-4 block lg:w-[600px]">
                </div>
                <div>
                    <i class="fa-regular fa-id-card"></i>
                    <label for="Passport or Id">national id or passport number</label>
                    <input type="text" placeholder="Enter Your Passport or National Id Number" class="border border-gray-400 rounded p-2 mb-4 block lg:w-[600px]">
                </div>
                <div> 
                    <i class="fa-solid fa-globe"></i>
                    <label for="country">Country</lebel>
                    <input type="text" placeholder="select Your Country" class="border border-gray-400 rounded p-2 mb-4 block lg:w-[600px]">
                </div>
                <div>
                    <i class="fa-solid fa-city"></i>
                    <label for="city">City</label>
                    <input type="text" placeholder="Enter Your City" class="border border-gray-400 rounded p-2 mb-4 block lg:w-[600px]">
                </div>




                <button type="submit" class="bg-red-700 text-white py-2 px-4 rounded">Login</button>
            </form>
        </div>
    </main>

</body>
